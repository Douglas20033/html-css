<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.conteiner{
            background-color: lightsalmon;
            display: flex;
        }

         div.item{
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
        }

        div#i1{
            order:0 ;
        }

        div#i2{
            order:4 ;
        }

        div#i3{
            order:6 ;
        }

        div#i4{
            order:2 ;
        }

        div#i5{
            order:7 ;
        }

        div#i6{
            order:1 ;
        }

        div#i7{
            order:3 ;
        }
    </style>
</head>
<body>
    <div class="conteiner" >
        <div id="i1">A</div>
        <div id="i2">B</div>
        <div id="i3">C</div>
        <div id="i4">D</div>
        <div id="i5">E</div>
        <div id="i6">F</div>
        <div id="i7">G</div>

    </div>
</body>
</html>
